        // --- COMPONENTE DE GRÁFICO CUSTOMIZADO (Remove dependência do Recharts para evitar bugs no CDN) ---
        const CustomBarChart = ({ data }) => {
          const maxVal = Math.max(...data.map(d => d.value), 1);
          return (
            <div className="w-full flex flex-col justify-center gap-3 py-2">
              {data.map((item, idx) => {
                const percent = Math.max((item.value / maxVal) * 100, 1);
                return (
                  <div key={idx} className="flex items-center gap-2">
                    <div className="w-20 md:w-24 shrink-0 text-right text-[10px] md:text-[11px] text-slate-600 font-semibold leading-tight truncate" title={item.name}>
                      {item.name}
                    </div>
                    <div className="flex-1 h-5 md:h-6 bg-slate-100 rounded-r-md flex items-center">
                      <div 
                        className="h-full rounded-r-md transition-all duration-1000 ease-out flex items-center justify-end px-2"
                        style={{ width: `${percent}%`, backgroundColor: item.color }}
                      >
                        {percent > 15 && <span className="text-[10px] md:text-[11px] text-white font-bold">{item.value}</span>}
                      </div>
                      {percent <= 15 && <span className="text-[10px] md:text-[11px] text-slate-600 font-bold ml-2">{item.value}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          );

        function App() {

          const [selectedFicha, setSelectedFicha] = useState(Object.keys(segmentsData[regionsData["rm_goiania"].segments[0]].fichas)[0]);

          const handleRegionChange = (e) => {
            const regionKey = e.target.value;
            setSelectedRegion(regionKey);
            const allowedSegments = regionsData[regionKey].segments;
            const newSegment = allowedSegments[0];
            setSelectedSegment(newSegment);
            const newFicha = Object.keys(segmentsData[newSegment].fichas)[0];
            setSelectedFicha(newFicha);
          };

          const handleSegmentChange = (e) => {
            const seg = e.target.value;
            setSelectedSegment(seg);
            setSelectedFicha(Object.keys(segmentsData[seg].fichas)[0]);
          };

          const currentRegionData = regionsData[selectedRegion];
          const currentSegmentData = segmentsData[selectedSegment];
          const currentFichaData = currentSegmentData.fichas[selectedFicha];

          const getRegionalStrategy = () => {
            if (currentFichaData.regionalStrategies && currentFichaData.regionalStrategies[selectedRegion]) {
              return currentFichaData.regionalStrategies[selectedRegion];
            }
            return currentFichaData.regionalStrategies?.["default"] || "Apresente os benefícios gerais da ficha, focando em redução de custos e aumento de vendas.";

            if (score >= 93) return 'text-rose-600';
            if (score >= 87) return 'text-amber-600';
            return 'text-blue-600';

            return 'bg-blue-50 border-blue-200';

                    </h2>

                    </p>
                  </div>
                </div>
              </div>

              {/* MAIN CONTROLS (FILTROS) */}

                <div className="mb-3 flex flex-wrap items-center gap-2 text-slate-200 md:text-slate-600 font-medium px-1">

                  <span className="text-xs md:text-sm drop-shadow-md md:drop-shadow-none text-slate-100 md:text-slate-700 font-semibold md:font-medium">Filtre o cenário do seu cliente:</span>

                  </div>

                  {/* FILTRO 3: FICHA */}
                  <div className="flex flex-col w-full md:w-1/3">
                    <label className="text-[11px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-2">
                      <span className="bg-blue-100 text-blue-700 w-5 h-5 rounded-full flex items-center justify-center text-[10px] shrink-0">3</span>
                      Ficha a ser Ofertada
                    </label>
                    <div className="relative">
                      <select 
                        className="w-full appearance-none bg-blue-50 border border-blue-200 text-blue-900 py-3 px-3 md:px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600 text-sm md:text-base font-bold shadow-sm cursor-pointer transition truncate pr-8"
                        value={selectedFicha}
                        onChange={(e) => setSelectedFicha(e.target.value)}
                      >
                        {Object.entries(currentSegmentData.fichas).map(([key, data]) => (
                          <option key={key} value={key}>{data.label}</option>
                        ))}
                      </select>
                      <Icons.ChevronDown className="absolute right-3 top-3.5 w-4 h-4 md:w-5 md:h-5 text-blue-600 pointer-events-none" />
                    </div>
                  </div>

                </div>

                {/* DASHBOARD CONTENT GRID */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
                  
                  {/* SIDEBAR: ESTRATÉGIA GEOGRÁFICA & INDICADORES */}
                  <div className="lg:col-span-4 flex flex-col gap-6">
                    
                    {/* CARD: DIRETRIZ REGIONAL */}
                    <div className="bg-rose-600 rounded-2xl shadow-lg border border-rose-500 p-5 md:p-6 text-white relative overflow-hidden">
                      <h2 className="text-[10px] md:text-xs font-bold text-rose-200 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <Icons.Map className="w-4 h-4" /> Entenda a Região
                      </h2>
                      <h3 className="text-base md:text-lg font-black mb-2 leading-tight">{currentRegionData.label}</h3>
                      <p className="text-xs md:text-sm text-rose-50 leading-relaxed">
                        {currentRegionData.context}
                      </p>
                      <div className="mt-4 pt-4 border-t border-rose-400/50 flex items-start gap-2">
                        <Icons.Info className="w-4 h-4 text-rose-200 mt-0.5 shrink-0" />
                        <p className="text-[10px] md:text-[11px] text-rose-100">
                          <strong>Dica:</strong> Mostre que você conhece a realidade e os desafios locais para gerar empatia imediata com o empresário.
                        </p>
                      </div>
                    </div>

                    {/* CARD: TÁTICA DA FICHA NA REGIÃO */}
                    <div className="bg-white rounded-2xl shadow-sm border-2 border-slate-800 p-5 md:p-6 relative mt-4 md:mt-0">
                      <div className="absolute top-0 left-5 -translate-y-1/2 bg-slate-800 text-white text-[9px] md:text-[10px] font-bold uppercase tracking-wider px-3 py-1 rounded-full shadow-md">
                        Gatilho Regional
                      </div>
                      <h2 className="text-xs md:text-sm font-bold text-slate-800 mb-3 mt-1 flex items-center gap-2">
                        <Icons.Target className="w-4 h-4 text-rose-600 shrink-0" /> Ação de Prospecção
                      </h2>
                      <p className="text-slate-700 text-xs md:text-sm font-medium leading-relaxed bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200">
                        {getRegionalStrategy()}
                      </p>
                    </div>

                    {/* THERMOMETER */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6 flex flex-col items-center text-center">
                      <h2 className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider mb-4 w-full flex justify-center items-center gap-2">
                         Termômetro de Vendas
                         <Icons.Activity className="w-4 h-4 text-slate-400 shrink-0" />
                      </h2>
                      
                      <div className="relative w-32 h-32 md:w-36 md:h-36 flex items-center justify-center mb-2 mx-auto">
                        <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                          <path className="text-slate-100" strokeWidth="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                          <path
                            className={getThermometerLabelColor(currentFichaData.score).replace('text-', 'text-')}
                            strokeWidth="4"
                            strokeDasharray={`${currentFichaData.score}, 100`}
                            strokeLinecap="round"
                            stroke="currentColor"
                            fill="none"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                          />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                          <span className={`text-4xl md:text-5xl font-black tracking-tighter ${getThermometerLabelColor(currentFichaData.score)}`}>
                            {currentFichaData.score}
                          </span>
                        </div>
                      </div>
                      <div className={`mt-2 px-4 py-1.5 rounded-full font-bold text-[10px] md:text-xs border w-full max-w-[200px] truncate ${getScoreBg(currentFichaData.score)} ${getThermometerLabelColor(currentFichaData.score)}`}>
                        {currentFichaData.level}
                      </div>
                      
                      <p className="text-[10px] md:text-[11px] text-slate-500 mt-4 leading-relaxed px-2">
                        Scores &gt; 90 indicam venda fácil (necessidade vital/risco de multas).
                      </p>
                    </div>

                  </div>

                  {/* MAIN COLUMN: SPIN METHODOLOGY CARDS */}
                  <div className="lg:col-span-8 flex flex-col gap-6">
                    
                    <div className="bg-blue-900 rounded-2xl p-5 md:p-6 shadow-lg text-white">
                      <h3 className="font-bold text-base md:text-lg flex items-center gap-2 mb-3">
                        <Icons.BarChart3 className="w-4 h-4 md:w-5 md:h-5 text-blue-400 shrink-0" /> Roteiro de Reunião: Método SPIN
                      </h3>
                      <p className="text-blue-100 text-xs md:text-sm leading-relaxed mb-4">
                        Não ofereça a ficha técnica de cara. Conduza o raciocínio do empresário para que ele mesmo perceba a dor antes de você dar o preço.
                      </p>
                      <div className="flex flex-wrap gap-2 text-[10px] md:text-xs font-semibold">
                        <span className="bg-blue-800 px-2 py-1 rounded">1. Situação (S)</span>
                        <span className="bg-amber-800/60 text-amber-100 px-2 py-1 rounded">2. Problema (P)</span>
                        <span className="bg-rose-800/60 text-rose-100 px-2 py-1 rounded">3. Implicação (I)</span>
                        <span className="bg-emerald-800/60 text-emerald-100 px-2 py-1 rounded">4. Necessidade (N)</span>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
                      
                      {/* SITUAÇÃO */}
                      <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6 flex flex-col group hover:border-blue-400 transition-colors h-full">
                        <div className="flex items-center gap-3 mb-3">
                          <div className="bg-blue-100 text-blue-700 w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center font-black text-base md:text-lg shrink-0">S</div>
                          <div>
                            <h3 className="text-base md:text-lg font-extrabold text-slate-800 leading-tight">Situação</h3>
                            <p className="text-[9px] md:text-[10px] text-slate-400 uppercase font-bold">O Cenário Atual</p>
                          </div>
                        </div>
                        <div className="flex-grow mt-2">
                          <p className="text-slate-600 text-xs md:text-sm leading-relaxed">
                            <span className="font-semibold text-slate-800">No polo de {currentRegionData.label}:</span> {currentRegionData.context}
                          </p>
                        </div>
                        <div className="mt-4 pt-3 border-t border-slate-100 flex items-start gap-2">
                          <Icons.Info className="w-3.5 h-3.5 md:w-4 md:h-4 text-blue-400 shrink-0 mt-0.5" />
                          <span className="text-[10px] md:text-[11px] text-slate-500">Valide o cenário. Ex: "Como estão as operações aqui na região?"</span>
                        </div>
                      </div>

                      {/* PROBLEMA */}
                      <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6 flex flex-col group hover:border-amber-400 transition-colors h-full">
                        <div className="flex items-center gap-3 mb-3">
                          <div className="bg-amber-100 text-amber-700 w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center font-black text-base md:text-lg shrink-0">P</div>
                          <div>
                            <h3 className="text-base md:text-lg font-extrabold text-slate-800 leading-tight">Problema</h3>
                            <p className="text-[9px] md:text-[10px] text-slate-400 uppercase font-bold">A Dor do Cliente</p>
                          </div>
                        </div>
                        <div className="flex-grow mt-2">
                          <p className="text-slate-800 font-medium text-xs md:text-sm leading-relaxed">
                            {currentFichaData.spin.p}
                          </p>
                        </div>
                        <div className="mt-4 pt-3 border-t border-slate-100 flex items-start gap-2">
                          <Icons.Info className="w-3.5 h-3.5 md:w-4 md:h-4 text-amber-500 shrink-0 mt-0.5" />
                          <span className="text-[10px] md:text-[11px] text-slate-500">Investigue: "Vocês têm enfrentado essa dificuldade ultimamente?"</span>
                        </div>
                      </div>

                      {/* IMPLICAÇÃO */}
                      <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-6 flex flex-col sm:col-span-2 border-l-4 border-l-rose-500">
                        <div className="flex items-center justify-between mb-3">
                          <div className="flex items-center gap-3">
                            <div className="bg-rose-100 text-rose-700 w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center font-black text-base md:text-lg shrink-0">I</div>
                            <div>
                              <h3 className="text-base md:text-lg font-extrabold text-slate-800 leading-tight">Implicação</h3>
                              <p className="text-[9px] md:text-[10px] text-rose-500 uppercase font-bold">O Custo da Inércia</p>
                            </div>
                          </div>
                          <Icons.ShieldAlert className="w-5 h-5 md:w-6 md:h-6 text-rose-200 shrink-0" />
                        </div>
                        <div className="bg-rose-50 rounded-xl p-3 md:p-4 border border-rose-100 mt-2">
                          <p className="text-rose-900 font-semibold text-xs md:text-sm leading-relaxed">
                            {currentFichaData.spin.i}
                          </p>
                        </div>
                        <div className="mt-3 flex items-start gap-2 px-1">
                          <Icons.Info className="w-3.5 h-3.5 md:w-4 md:h-4 text-rose-400 shrink-0 mt-0.5" />
                          <span className="text-[10px] md:text-[11px] text-slate-600">O clímax. Faça o cliente calcular mentalmente o prejuízo que terá se ignorar o problema. Aumente a urgência.</span>
                        </div>
                      </div>

                      {/* NECESSIDADE E GRÁFICO */}
                      <div className="bg-emerald-50 rounded-2xl shadow-sm border border-emerald-200 p-5 md:p-6 flex flex-col sm:col-span-2">
                        <div className="flex items-center justify-between mb-4">
                          <div className="flex items-center gap-3">
                            <div className="bg-emerald-500 text-white w-8 h-8 md:w-10 md:h-10 rounded-xl flex items-center justify-center font-black text-base md:text-lg shadow-md shadow-emerald-500/30 shrink-0">N</div>
                            <div>
                              <h3 className="text-base md:text-lg font-extrabold text-emerald-950 leading-tight">Necessidade de Solução</h3>
                              <p className="text-[9px] md:text-[10px] text-emerald-700 uppercase font-bold">Oferta da Ficha SENAI</p>
                            </div>
                          </div>
                          <Icons.CheckCircle2 className="w-5 h-5 md:w-6 md:h-6 text-emerald-500 shrink-0" />
                        </div>
                        
                        <div className="bg-white/60 p-3 md:p-4 rounded-xl border border-emerald-100 mb-5 md:mb-6">
                          <p className="text-emerald-900 text-sm md:text-base leading-relaxed font-bold">
                            {currentFichaData.spin.n}
                          </p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm border border-emerald-100 p-4 md:p-5 w-full flex flex-col md:flex-row items-center gap-4 md:gap-6 min-w-0">
                          
                          <div className="w-full md:w-1/2 flex flex-col justify-center">
                            <h4 className="text-[11px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-2">
                              <Icons.BarChart3 className="w-3 h-3 md:w-4 md:h-4" /> Argumento Visual
                            </h4>
                            <p className="text-xs md:text-sm text-slate-600 leading-relaxed mb-2">
                              Mostre os dados ao lado para provar que a solução já foi validada e gera resultados.
                            </p>
                            <p className="text-[9px] md:text-[10px] text-slate-400 italic">
                              Base: Relatório Oficial 2026
                            </p>
                          </div>

                          <div className="w-full md:w-1/2 min-w-0">
                            <p className="text-[9px] md:text-[10px] text-slate-500 text-center mb-3 uppercase font-bold tracking-wider truncate px-2">
                              {currentFichaData.chartTitle}
                            </p>
                            <CustomBarChart data={currentFichaData.chartData} />
                          </div>
                        </div>

                      </div>

                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
